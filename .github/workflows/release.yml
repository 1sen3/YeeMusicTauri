name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    permissions:
      contents: write

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build and Release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Yee Music v__VERSION__"
          releaseBody: "See the assets below to download the latest version."
          releaseDraft: false
          prerelease: false

      - name: List build artifacts
        if: success() && matrix.platform == 'windows-latest'
        shell: bash
        run: |
          echo "Listing files in src-tauri/target/release/bundle:"
          ls -R src-tauri/target/release/bundle || echo "Directory not found"

      - name: Update updater metadata
        if: success() && matrix.platform == 'windows-latest'
        shell: bash
        run: |
          # 配置 git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ github.ref_name }}"
          TAG="${{ github.ref_name }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          # 1. 递归搜索 .sig 文件并构建 metadata
          # 使用 node 脚本来处理，因为它比 bash 更容易处理 JSON 和文件搜索
          node -e "
            const fs = require('fs');
            const path = require('path');

            function findFile(dir, predicate) {
              if (!fs.existsSync(dir)) return null;
              const files = fs.readdirSync(dir);
              for (const file of files) {
                const fullPath = path.join(dir, file);
                const stats = fs.statSync(fullPath);
                if (stats.isDirectory()) {
                  const found = findFile(fullPath, predicate);
                  if (found) return found;
                } else if (predicate(file)) {
                  return fullPath;
                }
              }
              return null;
            }

            const searchRoot = 'src-tauri/target/release/bundle';
            const sigPath = findFile(searchRoot, f => f.endsWith('.sig'));

            if (!sigPath) {
              console.error('错误: 在 ' + searchRoot + ' 中找不到 .sig 签名文件。');
              console.error('请确保 TAURI_PRIVATE_KEY 和 TAURI_PASSWORD 已正确设置。');
              process.exit(1);
            }

            console.log('找到签名文件:', sigPath);
            const signature = fs.readFileSync(sigPath, 'utf-8').trim();
            const assetFile = path.basename(sigPath).replace('.sig', '');
            const downloadUrl = 'https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/${TAG}/' + assetFile;

            const latest = {
              version: '${TAG}',
              notes: 'Update released on ' + new Date().toISOString(),
              pub_date: new Date().toISOString(),
              platforms: {
                'windows-x86_64': { signature, url: downloadUrl }
              }
            };

            // 临时保存，稍后切分支后再写回
            fs.writeFileSync('latest_temp.json', JSON.stringify(latest, null, 2));
          "

          # 2. 干净地切换到 updater 分支
          # 我们使用一个新的克隆或利用现有的 worktree 来避免在主分支留下残余
          git fetch origin updater || git checkout --orphan updater
          git checkout updater
          git pull origin updater || true

          # 只保留最新生成的 metadata
          mv latest_temp.json latest.json
          
          # 提交并推送
          git add latest.json
          git commit -m "update updater metadata for ${TAG}" || echo "No changes to commit"
          git push origin updater
